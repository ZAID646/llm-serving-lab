services:
  vllm:
    image: vllm/vllm-openai:v0.24.0
    runtime: nvidia
    ipc: host
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command:
      - --model
      - ${MODEL_ID}
      - --quantization
      - compressed-tensors
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS:-128}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEM_UTIL:-0.92}
      - --enable-prefix-caching
      - --port
      - "8000"
    networks:
      - llm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    runtime: nvidia
    ports:
      - "9400:9400"
    networks:
      - llm-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - llm-net
    depends_on:
      vllm:
        condition: service_started
      dcgm-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - llm-net
    depends_on:
      - prometheus

  locust-master:
    build: ./docker/locust
    ports:
      - "8089:8089"
    environment:
      - VLLM_URL=http://vllm:8000
      - MODEL_ID=${MODEL_ID}
    env_file: .env
    command:
      - --master
      - --host=http://vllm:8000
      - --web-host=0.0.0.0
      - --web-port=8089
    networks:
      - llm-net

  locust-worker:
    build: ./docker/locust
    environment:
      - LOCUST_MASTER_HOST=locust-master
      - VLLM_URL=http://vllm:8000
      - MODEL_ID=${MODEL_ID}
    env_file: .env
    command:
      - --worker
      - --master-host=locust-master
    networks:
      - llm-net

networks:
  llm-net:
    driver: bridge
